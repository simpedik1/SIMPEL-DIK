<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPEL-DIK | Input Data Siswa</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --bg-light: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
        }

        /* --- Header Identitas --- */
        .page-header {
            text-align: center;
            color: #fff;
            margin-bottom: 25px;
        }

        .page-header .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
        }

        .page-header .brand i { font-size: 1.4rem; }

        .page-header .sekolah {
            margin-top: 6px;
            font-size: 1.05rem;
            font-weight: 600;
            opacity: 0.95;
        }

        .page-header .subtitle {
            margin-top: 2px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        /* --- Card Form --- */
        .form-card {
            background: #fff;
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 30px;
            animation: slideUp 0.35s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .form-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .form-card-header i {
            font-size: 1.4rem;
            color: var(--primary-color);
        }

        .form-card-header h3 {
            color: #333;
            font-size: 1.15rem;
        }

        .form-card-header p {
            color: #888;
            font-size: 0.82rem;
            margin-top: 2px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 0.95rem; transition: border-color 0.3s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        input[type="date"] { position: relative; padding-right: 10px; color: #444; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.3s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; transform: scale(1.1); }

        .form-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }

        .btn {
            padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.3s; font-size: 0.9rem; color: white;
        }
        .btn-primary { background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background-color: #cbd5e1; }

        /* --- Status Message (Sukses / Error) --- */
        .status-box {
            display: none;
            text-align: center;
            padding: 30px 10px;
        }
        .status-box.active { display: block; }
        .status-box i { font-size: 3rem; margin-bottom: 15px; }
        .status-box.success i { color: #10b981; }
        .status-box h3 { color: #333; margin-bottom: 8px; }
        .status-box p { color: #777; font-size: 0.9rem; margin-bottom: 20px; }

        .page-footer {
            margin-top: 25px;
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .form-card { padding: 20px; }
            .page-header .brand { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="brand"><i class="fas fa-graduation-cap"></i> SIMPEL-DIK</div>
        <div class="sekolah">SMP Negeri 2 Simpang Teritip</div>
        <div class="subtitle">Formulir Input Data Siswa</div>
    </div>

    <div class="form-card">
        <!-- Form Input -->
        <div id="formWrapper">
            <div class="form-card-header">
                <i class="fas fa-user-plus"></i>
                <div>
                    <h3>Input Data Siswa</h3>
                    <p>Silakan isi data dengan benar dan lengkap.</p>
                </div>
            </div>
            <form id="siswaForm">
                <div class="form-group">
                    <label for="nisn">NISN</label>
                    <input type="number" id="nisn" name="nisn" placeholder="Nomor Induk Siswa Nasional" required>
                </div>
                <div class="form-group">
                    <label for="namaSiswa">Nama Siswa</label>
                    <input type="text" id="namaSiswa" name="namaSiswa" placeholder="Nama Lengkap Siswa" required>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label for="tempatLahir">Tempat Lahir</label>
                        <input type="text" id="tempatLahir" name="tempatLahir" placeholder="Kota Kelahiran">
                    </div>
                    <div>
                        <label for="tanggalLahir">Tanggal Lahir</label>
                        <input type="date" id="tanggalLahir" name="tanggalLahir">
                    </div>
                </div>
                <div class="form-group">
                    <label for="namaAyah">Nama Ayah</label>
                    <input type="text" id="namaAyah" name="namaAyah" placeholder="Nama Ayah Kandung">
                </div>
                <div class="form-group">
                    <label for="namaIbu">Nama Ibu</label>
                    <input type="text" id="namaIbu" name="namaIbu" placeholder="Nama Ibu Kandung">
                </div>
                <div class="form-group">
                    <label for="alamat">Alamat</label>
                    <textarea id="alamat" name="alamat" placeholder="Alamat Lengkap" required></textarea>
                </div>
                <div class="form-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>

        <!-- Status Sukses -->
        <div id="successBox" class="status-box success">
            <i class="fas fa-check-circle"></i>
            <h3>Data Berhasil Dikirim!</h3>
            <p>Terima kasih, data siswa sudah tersimpan.</p>
            <button type="button" class="btn btn-primary" id="isiLagiBtn"><i class="fas fa-plus"></i> Isi Data Lain</button>
        </div>
    </div>

    <div class="page-footer">
        &copy; 2026 SMP Negeri 2 Simpang Teritip.
    </div>

    <script>
        // --- Supabase Integration ---
        const supabaseUrl = 'https://obamjophcayslmubcqrp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iYW1qb3BoY2F5c2xtdWJjcXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODA3MDgsImV4cCI6MjA5OTg1NjcwOH0.-RSXTD3gXO_4iZNj1SIBppslskVrZYbIpOZKwt5or_I';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const siswaForm = document.getElementById('siswaForm');
        const formWrapper = document.getElementById('formWrapper');
        const successBox = document.getElementById('successBox');

        // --- Cancel: menutup tab/link (bukan pindah ke dashboard) ---
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.close();
            // Fallback jika browser mencegah window.close() (tab tidak dibuka via script)
            setTimeout(() => {
                if (!window.closed) {
                    formWrapper.innerHTML = '<div style="text-align:center;padding:30px 10px;color:#777;">'
                        + '<i class="fas fa-info-circle" style="font-size:2rem;color:#94a3b8;margin-bottom:10px;display:block;"></i>'
                        + 'Silakan tutup tab/jendela ini secara manual.</div>';
                }
            }, 300);
        });

        // --- Submit Form: insert langsung ke tabel datasiswa di Supabase ---
        siswaForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = siswaForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Menyimpan...';
            submitBtn.disabled = true;

            try {
                const siswaData = {
                    nisn: document.getElementById('nisn').value,
                    nama_siswa: document.getElementById('namaSiswa').value,
                    tempat_lahir: document.getElementById('tempatLahir').value,
                    tanggal_lahir: document.getElementById('tanggalLahir').value || null,
                    nama_ayah: document.getElementById('namaAyah').value,
                    nama_ibu: document.getElementById('namaIbu').value,
                    alamat: document.getElementById('alamat').value
                };

                const { error } = await supabaseClient
                    .from('datasiswa')
                    .insert([siswaData]);

                if (error) throw error;

                // Tampilkan status sukses
                formWrapper.style.display = 'none';
                successBox.classList.add('active');
                siswaForm.reset();
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan: ' + err.message);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // --- Tombol Isi Data Lain: kembali ke form kosong ---
        document.getElementById('isiLagiBtn').addEventListener('click', () => {
            successBox.classList.remove('active');
            formWrapper.style.display = 'block';
        });
    </script>
</body>
</html>
