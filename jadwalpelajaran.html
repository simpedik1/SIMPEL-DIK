<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPPEDIK-SMKN 1 Mentok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --header-height: 60px;
            --bg-light: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--bg-light);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('bg2.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(5px);
            transform: scale(1.05);
            z-index: -1;
        }

        /* --- Navbar --- */
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            z-index: 1002;
            position: fixed;
            top: 0; left: 0; right: 0;
            gap: 12px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
        }

        .navbar-brand img {
            height: 40px;
            width: auto;
        }

        .navbar-brand span {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary-color);
        }

        .btn-dashboard {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .btn-dashboard:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .navbar-date {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- Main Content --- */
        .main-content {
            margin-top: var(--header-height);
            padding: 2rem;
            flex: 1;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: var(--primary-color);
        }

        .btn-tambah {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 12px rgba(17,153,142,0.3);
        }

        .btn-tambah:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- Card --- */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
        }

        /* --- Filter Bar --- */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-bar label {
            font-size: 0.88rem;
            color: #555;
            font-weight: 600;
        }

        .filter-select, .search-input {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.88rem;
            color: #333;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-select:focus, .search-input:focus {
            border-color: var(--primary-color);
        }

        .search-input {
            flex: 1;
            min-width: 180px;
        }

        /* --- Table --- */
        .table-responsive {
            overflow-x: auto;
        }

        .jadwal-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .jadwal-table th {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 13px 16px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }

        .jadwal-table th:first-child { border-radius: 8px 0 0 0; }
        .jadwal-table th:last-child  { border-radius: 0 8px 0 0; }

        .jadwal-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f1f1;
            color: #444;
            vertical-align: middle;
        }

        .jadwal-table tr:hover td {
            background-color: #f8f9ff;
        }

        .jadwal-table tr:last-child td {
            border-bottom: none;
        }

        .badge-hari {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            color: white;
        }

        .hari-senin    { background: #667eea; }
        .hari-selasa   { background: #11998e; }
        .hari-rabu     { background: #f7971e; }
        .hari-kamis    { background: #8e2de2; }
        .hari-jumat    { background: #ee0979; }
        .hari-sabtu    { background: #2980b9; }
        .hari-default  { background: #aaa; }

        .jam-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f0f4ff;
            color: var(--primary-color);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .btn-action {
            border: none;
            cursor: pointer;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.82rem;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit   { background: #e8f4fd; color: #2980b9; }
        .btn-hapus  { background: #fdecea; color: #e74c3c; }
        .btn-action:hover { opacity: 0.75; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #aaa;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
            color: #ddd;
        }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(3px);
            z-index: 9000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 14px;
            width: 90%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
            overflow: hidden;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(-20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 18px 24px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.35);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group label span.required {
            color: #e74c3c;
            margin-left: 3px;
        }

        .form-control {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #333;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
            background: white;
        }

        .form-control:disabled {
            background: #eef2ff;
            color: #667eea;
            font-weight: 600;
            cursor: default;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Time Picker styling */
        input[type="time"].form-control {
            cursor: pointer;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #f1f1f1;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            padding: 9px 20px;
            background: #f1f3f5;
            color: #555;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background: #e2e6ea; }

        .btn-simpan {
            padding: 9px 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-simpan:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        /* Toast Notif */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2ecc71;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 8px;
            animation: slideUp 0.3s ease;
        }

        .toast.show { display: flex; }
        .toast.error { background: #e74c3c; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        .main-footer {
            text-align: center;
            padding: 16px;
            color: #888;
            font-size: 0.82rem;
            border-top: 1px solid #eee;
            margin-top: 24px;
            background: rgba(255,255,255,0.6);
        }

        @media (max-width: 768px) {
            .navbar-brand span { font-size: 0.9rem; }
            .navbar-date { display: none !important; }
            .main-content { padding: 1rem 5px; }
            .form-row { grid-template-columns: 1fr; }
            .page-title { font-size: 1.1rem; }

            .card {
                padding: 15px;
            }

            .modal-box {
                width: calc(100% - 10px);
                margin: 0 5px;
            }

            .modal-header {
                padding: 14px 16px;
            }

            .modal-body {
                padding: 16px;
            }

            .modal-footer {
                padding: 14px 16px;
                flex-wrap: wrap;
            }

            .modal-footer .btn-cancel,
            .modal-footer .btn-simpan {
                flex: 1 1 auto;
                justify-content: center;
            }

            .toast {
                left: 5px;
                right: 5px;
                bottom: 12px;
                width: auto;
            }

            .page-header {
                width: 100%;
            }

            .btn-tambah {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="#" class="navbar-brand">
            <img src="" alt="Logo Sekolah" id="navLogo" style="display:none;">
            <span id="navNamaSekolah"></span>
        </a>
        <a href="dasboradmin.html" class="btn-dashboard">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <div class="navbar-date">
            <i class="far fa-calendar-alt" style="color: var(--primary-color);"></i>
            <span id="navbarDate"></span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-calendar-alt"></i> Jadwal Pelajaran
            </h1>
            <button class="btn-tambah" onclick="bukaModalTambah()">
                <i class="fas fa-plus-circle"></i> Tambah Jadwal
            </button>
        </div>

        <div class="card">
            <!-- Filter Bar -->
            <div class="filter-bar">
                <label for="filterHari"><i class="fas fa-filter"></i> Filter Hari:</label>
                <select id="filterHari" class="filter-select" onchange="filterTabel()">
                    <option value="">Semua Hari</option>
                    <option value="Senin">Senin</option>
                    <option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option>
                    <option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option>
                    <option value="Sabtu">Sabtu</option>
                </select>
                <label for="filterKelas"><i class="fas fa-users"></i> Kelas:</label>
                <select id="filterKelas" class="filter-select" onchange="filterTabel()">
                    <option value="">Semua Kelas</option>
                </select>
                <input type="text" id="searchInput" class="search-input" placeholder="&#xf002;  Cari mata pelajaran / guru..." oninput="filterTabel()">
            </div>

            <!-- Tabel -->
            <div class="table-responsive">
                <table class="jadwal-table" id="jadwalTable">
                    <thead>
                        <tr>
                            <th style="width:60px;">ID</th>
                            <th>Blok</th>
                            <th>Hari</th>
                            <th>Kelas</th>
                            <th>Mata Pelajaran</th>
                            <th>Guru Pengajar</th>
                            <th>Jam Mulai</th>
                            <th>Jam Berakhir</th>
                            <th style="width:110px; text-align:center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="jadwalTableBody">
                        <tr id="loadingRow">
                            <td colspan="8" style="text-align:center; padding:40px; color:#aaa;">
                                <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; display:block; margin-bottom:10px;"></i>
                                Memuat data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        &copy; <span id="tahunFooter"></span> SMKN 1 Simpang Teritip &mdash; Sistem Informasi Sekolah
    </footer>

    <!-- ===================== MODAL INPUT ===================== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalJudul">
                    <i class="fas fa-calendar-plus"></i> Tambah Jadwal Pelajaran
                </h3>
                <button class="modal-close" onclick="tutupModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">

                <div class="form-group">
                    <label>ID Jadwal</label>
                    <input type="text" id="inputId" class="form-control" disabled placeholder="Otomatis terisi">
                </div>

                <div class="form-group">
                    <label for="inputBlok">Blok Mapel <span class="required">*</span></label>
                    <select id="inputBlok" class="form-control">
                        <option value="">-- Pilih Blok --</option>
                        <option value="Produktif">Produktif</option>
                        <option value="Umum">Umum</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputKelas">Kelas <span class="required">*</span></label>
                    <select id="inputKelas" class="form-control">
                        <option value="">-- Pilih Kelas --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputHari">Hari <span class="required">*</span></label>
                    <select id="inputHari" class="form-control">
                        <option value="">-- Pilih Hari --</option>
                        <option value="Senin">Senin</option>
                        <option value="Selasa">Selasa</option>
                        <option value="Rabu">Rabu</option>
                        <option value="Kamis">Kamis</option>
                        <option value="Jumat">Jumat</option>
                        <option value="Sabtu">Sabtu</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputMapel">Mata Pelajaran <span class="required">*</span></label>
                    <select id="inputMapel" class="form-control" onchange="handleMapelChange()">
                        <option value="">-- Pilih Mata Pelajaran --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputGuru">Guru Yang Mengajar <span class="required">*</span></label>
                    <input type="text" id="inputGuru" class="form-control" placeholder="Otomatis terisi setelah memilih mata pelajaran">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="inputJamMulai">Jam Mulai <span class="required">*</span></label>
                        <input type="time" id="inputJamMulai" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="inputJamBerakhir">Jam Berakhir <span class="required">*</span></label>
                        <input type="time" id="inputJamBerakhir" class="form-control">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="tutupModal()"><i class="fas fa-times"></i> Batal</button>
                <button class="btn-simpan" onclick="simpanJadwal()"><i class="fas fa-save"></i> Simpan</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifikasi -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        const supabaseUrl = 'https://ixccpgfllwerlifpcpdp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Y2NwZ2ZsbHdlcmxpZnBjcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTE3MTEsImV4cCI6MjA5ODQyNzcxMX0.CwrrPcl0RkDK4zRWhfp7oTqwNlxOIZIb3IGUUzKTE9Q';

        let supabaseClient = null;

        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        }

        // ============================================================
        //  SUPABASE CONFIG - PROJECT TERPISAH UNTUK MATA PELAJARAN
        //  Tabel: matapelajaran (kolom: id, kode_mapel, nama_mapel, nama_guru)
        // ============================================================
        const absensiUrl = 'https://ixccpgfllwerlifpcpdp.supabase.co';
        const absensiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Y2NwZ2ZsbHdlcmxpZnBjcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTE3MTEsImV4cCI6MjA5ODQyNzcxMX0.CwrrPcl0RkDK4zRWhfp7oTqwNlxOIZIb3IGUUzKTE9Q';

        let absensiClient = null;

        if (typeof supabase !== 'undefined') {
            absensiClient = supabase.createClient(absensiUrl, absensiKey);
        }

        // ============================================================
        //  DATA (local array sebagai backup / fallback jika tabel belum ada)
        // ============================================================
        let dataJadwal = [];
        let dataMapel = [];
        let dataRombel = [];
        let nextId = 1;
        let modeEdit = false;

        // ============================================================
        //  NAVBAR: Tanggal & Identitas Sekolah
        // ============================================================
        function updateNavbarDate() {
            const now = new Date();
            const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('navbarDate').textContent = now.toLocaleDateString('id-ID', opts);
            document.getElementById('tahunFooter').textContent = now.getFullYear();
        }

        async function loadSchoolIdentity() {
            if (!supabaseClient) return;
            try {
                const { data } = await supabaseClient
                    .from('identitassekolah')
                    .select('nama_sekolah, logo')
                    .limit(1)
                    .single();
                if (data) {
                    if (data.nama_sekolah) document.getElementById('navNamaSekolah').textContent = data.nama_sekolah;
                    if (data.logo) {
                        const img = document.getElementById('navLogo');
                        img.src = data.logo;
                        img.style.display = 'block';
                    }
                }
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        //  MATA PELAJARAN (Dropdown + Auto-fill Guru Pengajar)
        //  Sumber: project Supabase terpisah, tabel 'matapelajaran'
        //  Kolom: id, kode_mapel, nama_mapel, nama_guru
        // ============================================================
        async function loadMapelOptions() {
            const select = document.getElementById('inputMapel');
            if (!select || !absensiClient) return;

            try {
                const { data, error } = await absensiClient
                    .from('matapelajaran')
                    .select('nama_mapel, nama_guru')
                    .order('nama_mapel', { ascending: true });

                if (error) throw error;

                dataMapel = data || [];
                select.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>' +
                    dataMapel.map(m => `<option value="${m.nama_mapel}">${m.nama_mapel}</option>`).join('');
            } catch (err) {
                console.warn('Gagal memuat data mata pelajaran:', err.message);
            }
        }

        function handleMapelChange() {
            const namaMapel = document.getElementById('inputMapel').value;
            const found = dataMapel.find(m => m.nama_mapel === namaMapel);
            document.getElementById('inputGuru').value = found ? (found.nama_guru || '') : '';
        }

        // ============================================================
        //  ROMBEL (Dropdown Kelas)
        //  Sumber: supabaseClient (project utama), tabel 'rombel'
        //  Kolom: id, nama_kelas, jumlah_siswa
        // ============================================================
        async function loadRombelOptions() {
            const selModal  = document.getElementById('inputKelas');
            const selFilter = document.getElementById('filterKelas');
            if (!supabaseClient) return;

            try {
                const { data, error } = await supabaseClient
                    .from('rombel')
                    .select('id, nama_kelas')
                    .order('nama_kelas', { ascending: true });

                if (error) throw error;

                dataRombel = data || [];

                const optionsHtml = dataRombel
                    .map(r => `<option value="${r.nama_kelas}">${r.nama_kelas}</option>`)
                    .join('');

                if (selModal) {
                    selModal.innerHTML = '<option value="">-- Pilih Kelas --</option>' + optionsHtml;
                }
                if (selFilter) {
                    selFilter.innerHTML = '<option value="">Semua Kelas</option>' + optionsHtml;
                }
            } catch (err) {
                console.warn('Gagal memuat data rombel:', err.message);
            }
        }

        // ============================================================
        //  SUPABASE TABLE: jadwalpelajaran
        //  Kolom: id (int8, PK, identity), hari, mata_pelajaran, guru, jam_mulai, jam_berakhir
        // ============================================================
        async function loadJadwal() {
            const tbody = document.getElementById('jadwalTableBody');

            if (!supabaseClient) {
                renderTabel();
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('jadwalpelajaran')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                dataJadwal = data || [];
                if (dataJadwal.length > 0) {
                    nextId = Math.max(...dataJadwal.map(d => d.id)) + 1;
                }
                renderTabel();
            } catch (err) {
                console.warn('Tabel jadwalpelajaran belum ada atau error:', err.message);
                renderTabel(); // Render kosong
            }
        }

        // ============================================================
        //  RENDER TABEL
        // ============================================================
        const hariOrder = { Senin:1, Selasa:2, Rabu:3, Kamis:4, Jumat:5, Sabtu:6 };

        function badgeBlok(blok) {
            const map = { Produktif: '#11998e', Umum: '#f7971e' };
            const color = map[blok] || '#aaa';
            return `<span class="badge-hari" style="background:${color};">${blok || '-'}</span>`;
        }

        function badgeHari(hari) {
            const map = {
                Senin:'hari-senin', Selasa:'hari-selasa', Rabu:'hari-rabu',
                Kamis:'hari-kamis', Jumat:'hari-jumat', Sabtu:'hari-sabtu'
            };
            const cls = map[hari] || 'hari-default';
            return `<span class="badge-hari ${cls}">${hari}</span>`;
        }

        function formatJam(jam) {
            if (!jam) return '-';
            // jam dalam format HH:MM:SS atau HH:MM
            return jam.substring(0, 5);
        }

        function renderTabel(list) {
            const tbody = document.getElementById('jadwalTableBody');
            const data = list !== undefined ? list : dataJadwal;

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9">
                            <div class="empty-state">
                                <i class="fas fa-calendar-times"></i>
                                Belum ada data jadwal pelajaran.<br>
                                <small>Klik <strong>Tambah Jadwal</strong> untuk menambahkan.</small>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = data.map((row, idx) => `
                <tr>
                    <td><strong style="color:var(--primary-color);">${row.id}</strong></td>
                    <td>${badgeBlok(row.blok)}</td>
                    <td>${badgeHari(row.hari)}</td>
                    <td><i class="fas fa-users" style="color:#8e2de2; margin-right:6px;"></i>${row.kelas || '-'}</td>
                    <td><i class="fas fa-book" style="color:#f7971e; margin-right:6px;"></i>${row.mapel || '-'}</td>
                    <td><i class="fas fa-chalkboard-teacher" style="color:#2980b9; margin-right:6px;"></i>${row.guru_mapel || '-'}</td>
                    <td><span class="jam-badge"><i class="far fa-clock"></i>${formatJam(row.jam_mulai)}</span></td>
                    <td><span class="jam-badge"><i class="far fa-clock"></i>${formatJam(row.jam_berakhir)}</span></td>
                    <td style="text-align:center;">
                        <button class="btn-action btn-edit" onclick="editJadwal('${row.id}')" title="Edit">
                            <i class="fas fa-pencil-alt"></i>
                        </button>
                        <button class="btn-action btn-hapus" onclick="hapusJadwal('${row.id}')" title="Hapus">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // ============================================================
        //  FILTER TABEL
        // ============================================================
        function filterTabel() {
            const filterHari  = document.getElementById('filterHari').value.toLowerCase();
            const filterKelas = document.getElementById('filterKelas').value.toLowerCase();
            const search      = document.getElementById('searchInput').value.toLowerCase();

            const filtered = dataJadwal.filter(row => {
                const matchHari  = !filterHari  || (row.hari  || '').toLowerCase() === filterHari;
                const matchKelas = !filterKelas || (row.kelas || '').toLowerCase() === filterKelas;
                const matchSearch = !search ||
                    (row.mapel || '').toLowerCase().includes(search) ||
                    (row.guru_mapel || '').toLowerCase().includes(search);
                return matchHari && matchKelas && matchSearch;
            });

            renderTabel(filtered);
        }

        // ============================================================
        //  MODAL: Buka / Tutup
        // ============================================================
        async function getNextId() {
            if (!supabaseClient) return nextId;
            try {
                const { data } = await supabaseClient
                    .from('jadwalpelajaran')
                    .select('id')
                    .order('id', { ascending: false })
                    .limit(1);
                if (data && data.length > 0) {
                    // id format: JPL-0001, ambil angkanya lalu increment
                    const last = data[0].id;
                    const num = parseInt(last.replace(/\D/g, '')) || 0;
                    return num + 1;
                }
                return 1;
            } catch { return nextId; }
        }

        async function bukaModalTambah() {
            modeEdit = false;
            document.getElementById('modalJudul').innerHTML = '<i class="fas fa-calendar-plus"></i> Tambah Jadwal Pelajaran';
            document.getElementById('editId').value = '';
            document.getElementById('inputHari').value = '';
            document.getElementById('inputBlok').value = '';
            document.getElementById('inputKelas').value = '';
            document.getElementById('inputMapel').value = '';
            document.getElementById('inputGuru').value = '';
            document.getElementById('inputJamMulai').value = '';
            document.getElementById('inputJamBerakhir').value = '';

            const id = await getNextId();
            document.getElementById('inputId').value = 'JPL-' + String(id).padStart(4, '0');

            document.getElementById('modalOverlay').classList.add('show');
        }

        function tutupModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // Tutup modal jika klik di luar box
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) tutupModal();
        });

        // ============================================================
        //  EDIT
        // ============================================================
        function editJadwal(id) {
            const row = dataJadwal.find(d => d.id === id);
            if (!row) return;

            modeEdit = true;
            document.getElementById('modalJudul').innerHTML = '<i class="fas fa-edit"></i> Edit Jadwal Pelajaran';
            document.getElementById('editId').value = id;
            document.getElementById('inputId').value = id;
            document.getElementById('inputBlok').value = row.blok || '';
            document.getElementById('inputHari').value = row.hari || '';
            document.getElementById('inputKelas').value = row.kelas || '';
            document.getElementById('inputMapel').value = row.mapel || '';
            document.getElementById('inputGuru').value = row.guru_mapel || '';
            document.getElementById('inputJamMulai').value = (row.jam_mulai || '').substring(0, 5);
            document.getElementById('inputJamBerakhir').value = (row.jam_berakhir || '').substring(0, 5);

            document.getElementById('modalOverlay').classList.add('show');
        }

        // ============================================================
        //  SIMPAN (Tambah / Update)
        // ============================================================
        async function simpanJadwal() {
            const blok        = document.getElementById('inputBlok').value.trim();
            const hari        = document.getElementById('inputHari').value.trim();
            const kelas       = document.getElementById('inputKelas').value.trim();
            const mapel       = document.getElementById('inputMapel').value.trim();
            const guru        = document.getElementById('inputGuru').value.trim();
            const jamMulai    = document.getElementById('inputJamMulai').value;
            const jamBerakhir = document.getElementById('inputJamBerakhir').value;

            if (!blok || !hari || !kelas || !mapel || !guru || !jamMulai || !jamBerakhir) {
                showToast('Semua field wajib diisi!', true);
                return;
            }

            if (jamBerakhir <= jamMulai) {
                showToast('Jam berakhir harus lebih dari jam mulai!', true);
                return;
            }

            const payload = {
                blok:        blok,
                hari:        hari,
                kelas:       kelas,
                mapel:       mapel,
                guru_mapel:  guru,
                jam_mulai:   jamMulai,
                jam_berakhir: jamBerakhir
            };

            try {
                if (modeEdit) {
                    const id = document.getElementById('editId').value;
                    if (supabaseClient) {
                        const { error } = await supabaseClient
                            .from('jadwalpelajaran')
                            .update(payload)
                            .eq('id', id);
                        if (error) throw error;
                    } else {
                        const idx = dataJadwal.findIndex(d => d.id === id);
                        if (idx !== -1) dataJadwal[idx] = { id, ...payload };
                    }
                    showToast('Data jadwal berhasil diperbarui!');
                } else {
                    const newId = document.getElementById('inputId').value;
                    const insertPayload = { id: newId, ...payload };
                    if (supabaseClient) {
                        const { error } = await supabaseClient
                            .from('jadwalpelajaran')
                            .insert([insertPayload]);
                        if (error) throw error;
                    } else {
                        dataJadwal.push({ id: newId, ...payload });
                    }
                    showToast('Jadwal baru berhasil ditambahkan!');
                }

                tutupModal();
                await loadJadwal();
            } catch (err) {
                showToast('Gagal menyimpan: ' + err.message, true);
            }
        }

        // ============================================================
        //  HAPUS
        // ============================================================
        async function hapusJadwal(id) {
            if (!confirm('Yakin ingin menghapus jadwal ini?')) return;

            try {
                if (supabaseClient) {
                    const { error } = await supabaseClient
                        .from('jadwalpelajaran')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    dataJadwal = dataJadwal.filter(d => d.id !== id);
                }
                showToast('Data jadwal berhasil dihapus!');
                await loadJadwal();
            } catch (err) {
                showToast('Gagal menghapus: ' + err.message, true);
            }
        }

        // ============================================================
        //  TOAST NOTIFIKASI
        // ============================================================
        let toastTimer;
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
            toast.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbarDate();
            loadSchoolIdentity();
            loadMapelOptions();
            loadRombelOptions();
            loadJadwal();
        });
    </script>
</body>
</html>
