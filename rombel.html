<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPEL-DIK</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- jsPDF & AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            /* Variabel Utama (Sama dengan Dashboard) */
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --sidebar-bg: #2c3e50;
            --sidebar-text: #ecf0f1;
            --sidebar-hover: #34495e;
            --header-height: 60px;
            --sidebar-width: 260px;

            /* Variabel Light Mode */
            --bg-overlay: rgba(241, 245, 249, 0.9); /* Overlay putih keabu-abuan */
            --card-bg: #ffffff;
            --text-main: #334155; /* Slate 700 */
            --text-muted: #64748b; /* Slate 500 */
            --border-color: #e2e8f0; /* Slate 200 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background Image dengan Overlay Light Mode */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('bg1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Navbar (Sama Persis dengan Dashboard) --- */
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1002;
            position: fixed;
            top: 0; left: 0; right: 0;
        }

        .navbar {
            justify-content: space-between;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
        }

        .navbar-brand img { height: 40px; width: auto; }
        .navbar-brand span { font-weight: 700; font-size: 1.1rem; color: var(--secondary-color); }

        /* --- Navbar Dashboard Button --- */
        .navbar-dashboard-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .navbar-dashboard-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- Main Content --- */
        .main-content {
            margin-top: var(--header-height);
            margin-left: 0;
            padding: 2rem 5px;
            flex: 1;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }

        /* --- Halaman Rombel Styles (Dark Mode) --- */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title h2 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-danger {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-danger:hover { background-color: #dc2626; transform: translateY(-1px); }

        /* Table Styles */
        .table-container {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-main);
        }

        .custom-table th, .custom-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .custom-table th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .custom-table tr:hover {
            background-color: #f1f5f9;
        }

        .custom-table tr:last-child td {
            border-bottom: none;
        }

        /* Footer */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            margin-top: 30px;
            background-color: rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .navbar-brand span { font-size: 1rem; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .action-buttons { width: 100%; }
            .btn { flex: 1; justify-content: center; }
        }

        /* --- Stats Cards --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
        }

        .stat-info h3 { font-size: 2rem; margin-bottom: 5px; color: var(--text-main); margin-top: 0; }
        .stat-info p { color: var(--text-muted); font-size: 0.9rem; margin: 0; }
        .stat-icon { font-size: 2.5rem; opacity: 0.8; }

        /* --- Modal Styles --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        .close-modal {
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #ef4444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dasboradmin.html" class="navbar-brand">
            <img src="" alt="Logo Sekolah" style="display: none;">
            <span></span>
        </a>
        <a href="dasboradmin.html" class="navbar-dashboard-btn">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
    </nav>
    <main class="main-content">
        <!-- Header Halaman -->
        <div class="page-header">
            <div class="page-title">
                <h2>Data Rombongan Belajar</h2>
                <p>Kelola data kelas dan jumlah siswa di sini.</p>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="addRombelBtn"><i class="fas fa-plus"></i> Tambah Rombel</button>
                <button class="btn btn-danger" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export Pdf</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3 id="totalRombel">0</h3>
                    <p>Jumlah Rombel</p>
                </div>
                <i class="fas fa-layer-group stat-icon" style="color: var(--primary-color);"></i>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3 id="totalSiswa">0</h3>
                    <p>Total Jumlah Siswa</p>
                </div>
                <i class="fas fa-users stat-icon" style="color: #10b981;"></i>
            </div>
        </div>

        <!-- Tabel Data -->
        <div class="table-container">
            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">No</th>
                            <th>Nama Kelas</th>
                            <th>Jumlah Siswa</th>
                            <th style="width: 100px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data akan dimuat di sini -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2024 SMK Negeri 1 Simpang Teritip. All rights reserved.</p>
        </footer>
    </main>

    <!-- Modal Tambah Rombel -->
    <div id="rombelModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Rombel Baru</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="addRombelForm">
                <input type="hidden" id="rombelId">
                <div class="form-group">
                    <label for="namaKelas">Nama Kelas</label>
                    <input type="text" id="namaKelas" name="namaKelas" required placeholder="Contoh: X TKJ 1">
                </div>
                <div class="form-group">
                    <label for="jumlahSiswa">Jumlah Siswa</label>
                    <input type="number" id="jumlahSiswa" name="jumlahSiswa" required placeholder="Contoh: 32">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveRombelBtn">Tambah Rombongan Belajar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Supabase Integration for Navbar Identity ---
        const supabaseUrl = 'https://obamjophcayslmubcqrp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iYW1qb3BoY2F5c2xtdWJjcXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODA3MDgsImV4cCI6MjA5OTg1NjcwOH0.-RSXTD3gXO_4iZNj1SIBppslskVrZYbIpOZKwt5or_I';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let schoolData = {}; // Menyimpan data sekolah untuk keperluan export

        // Load Identitas Sekolah
        async function loadSchoolIdentity() {
                try {
                    const { data, error } = await supabaseClient
                        .from('identitassekolah')
                        .select('nama_sekolah, logo, kop_sekolah')
                        .limit(1)
                        .single();
                    
                    if (data) {
                        schoolData = data; // Simpan data ke variabel global
                        if (data.nama_sekolah) {
                            document.querySelector('.navbar-brand span').textContent = data.nama_sekolah;
                        }
                        if (data.logo) {
                            const img = document.querySelector('.navbar-brand img');
                            img.src = data.logo;
                            img.style.display = 'block';
                        }
                    }
                } catch (err) {
                    console.error("Error loading school identity:", err);
                }
        }
        document.addEventListener('DOMContentLoaded', loadSchoolIdentity);
        document.addEventListener('DOMContentLoaded', loadRombelData);

        // Load Data Rombel dari Supabase
        async function loadRombelData() {
            const tableBody = document.querySelector('.custom-table tbody');
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';

            try {
                const { data, error } = await supabaseClient
                    .from('rombel')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                // Hitung Statistik
                const totalRombelCount = data.length;
                const totalSiswaCount = data.reduce((acc, curr) => acc + (Number(curr.jumlah_siswa) || 0), 0);

                document.getElementById('totalRombel').textContent = totalRombelCount;
                document.getElementById('totalSiswa').textContent = totalSiswaCount;

                tableBody.innerHTML = '';

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada data rombel.</td></tr>';
                    return;
                }

                data.forEach((rombel, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${rombel.nama_kelas}</td>
                        <td>${rombel.jumlah_siswa}</td>
                        <td>
                            <button onclick="openEditModal(${rombel.id}, '${rombel.nama_kelas.replace(/'/g, "\\'")}', ${rombel.jumlah_siswa})" style="background:none; border:none; color:#60a5fa; cursor:pointer;" title="Edit Rombel"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRombel(${rombel.id})" style="background:none; border:none; color:#f87171; cursor:pointer; margin-left:10px;" title="Hapus Rombel"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading rombel data:', error);
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: #ef4444;">Gagal memuat data: ${error.message}</td></tr>`;
            }
        }

        // Fungsi Hapus Rombel (Global)
        window.deleteRombel = async function(id) {
            if(confirm('Apakah Anda yakin ingin menghapus data ini?')) {
                try {
                    const { error } = await supabaseClient
                        .from('rombel')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    alert('Data berhasil dihapus');
                    loadRombelData();
                } catch (error) {
                    console.error('Error deleting:', error);
                    alert('Gagal menghapus data: ' + error.message);
                }
            }
        }

        // --- Modal Logic ---
        const modal = document.getElementById('rombelModal');
        const addBtn = document.getElementById('addRombelBtn');
        const closeSpan = document.querySelector('.close-modal');
        const cancelBtn = document.querySelector('.cancel-btn');
        const addRombelForm = document.getElementById('addRombelForm');
        const modalTitle = document.querySelector('.modal-header h3');
        const saveBtn = document.getElementById('saveRombelBtn');
        const rombelIdInput = document.getElementById('rombelId');

        // Buka Modal
        addBtn.addEventListener('click', () => {
            modalTitle.textContent = 'Tambah Rombel Baru';
            saveBtn.textContent = 'Tambah Rombongan Belajar';
            rombelIdInput.value = '';
            addRombelForm.reset();
            modal.classList.add('active');
        });

        // Buka Modal Edit (Global)
        window.openEditModal = function(id, nama, jumlah) {
            modalTitle.textContent = 'Edit Data Rombel';
            saveBtn.textContent = 'Update Data';
            rombelIdInput.value = id;
            document.getElementById('namaKelas').value = nama;
            document.getElementById('jumlahSiswa').value = jumlah;
            modal.classList.add('active');
        }

        // Tutup Modal (Fungsi Helper)
        function closeModal() {
            modal.classList.remove('active');
            addRombelForm.reset(); // Reset form saat ditutup
        }

        // Event Listeners untuk Tutup
        closeSpan.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        // Tutup jika klik di luar modal content
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Handle Form Submit (Simpan Data Rombel)
        addRombelForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = rombelIdInput.value;
            const namaKelas = document.getElementById('namaKelas').value;
            const jumlahSiswa = document.getElementById('jumlahSiswa').value;
            const submitBtn = addRombelForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            submitBtn.textContent = 'Menyimpan...';
            submitBtn.disabled = true;

            try {
                let result;
                if (id) {
                    // Update Data
                    result = await supabaseClient.from('rombel').update({ nama_kelas: namaKelas, jumlah_siswa: jumlahSiswa }).eq('id', id);
                } else {
                    // Insert Data Baru
                    result = await supabaseClient.from('rombel').insert([{ nama_kelas: namaKelas, jumlah_siswa: jumlahSiswa }]);
                }
                const { error } = result;

                if (error) throw error;

                alert('Data Rombongan Belajar berhasil disimpan!');
                closeModal();
                loadRombelData(); // Refresh tabel data
            } catch (error) {
                console.error('Error saving data:', error);
                alert('Gagal menyimpan data: ' + error.message);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // --- Export PDF Logic ---
        document.getElementById('exportPdfBtn').addEventListener('click', async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            let yPos = 20;

            // Tambahkan KOP Sekolah jika ada
            if (schoolData.kop_sekolah) {
                try {
                    const response = await fetch(schoolData.kop_sekolah);
                    const blob = await response.blob();
                    const base64data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });

                    const imgProps = doc.getImageProperties(base64data);
                    const pdfWidth = pageWidth - 20; // Margin kiri kanan 10
                    const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    doc.addImage(base64data, 'PNG', 10, 10, pdfWidth, imgHeight);
                    yPos = 10 + imgHeight + 10; // Update posisi Y di bawah gambar
                } catch (err) {
                    console.error("Gagal memuat KOP Sekolah:", err);
                }
            }

            // Judul Dokumen
            doc.setFontSize(18);
            doc.text("Laporan Data Rombongan Belajar", pageWidth / 2, yPos, { align: 'center' });
            yPos += 8;
            
            // Nama Sekolah (ambil dari navbar)
            const schoolName = schoolData.nama_sekolah || document.querySelector('.navbar-brand span').textContent;
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text(schoolName, pageWidth / 2, yPos, { align: 'center' });
            yPos += 10;

            // Persiapkan Data Tabel
            const tableRows = [];
            const rows = document.querySelectorAll('.custom-table tbody tr');

            rows.forEach((row) => {
                const cells = row.querySelectorAll('td');
                // Pastikan bukan baris loading atau kosong (cek jika ada kolom data)
                if (cells.length > 1) {
                    const rowData = [
                        cells[0].innerText, // No
                        cells[1].innerText, // Nama Kelas
                        cells[2].innerText  // Jumlah Siswa
                    ];
                    tableRows.push(rowData);
                }
            });

            // Generate Tabel PDF
            doc.autoTable({
                head: [['No', 'Nama Kelas', 'Jumlah Siswa']],
                body: tableRows,
                startY: yPos,
                theme: 'grid',
                styles: { fontSize: 10 },
                headStyles: { fillColor: [102, 126, 234] } // Warna primary-color
            });

            // Simpan File
            doc.save('Data_Rombel.pdf');
        });
    </script>
</body>
</html>
