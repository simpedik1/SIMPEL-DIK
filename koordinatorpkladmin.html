<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPPEDIK-SMKN 1 Mentok</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --header-height: 60px;
            --bg-light: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Mencegah scroll ganda pada body */
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg2.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(5px);
            transform: scale(1.05);
            z-index: -1;
        }

        /* --- Navbar --- */
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1002;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
        }

        .navbar-brand img {
            height: 40px;
            width: auto;
        }

        .navbar-brand span {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary-color);
        }

        .navbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-dashboard {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 2px 6px rgba(102,126,234,0.35);
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-dashboard:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .navbar-date {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* --- Main Content --- */
        .main-content {
            margin-top: var(--header-height);
            margin-left: 0;
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
        }

        .dashboard-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            overflow: visible;
        }

        .card-header { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .card-header h3 { font-size: 1.1rem; color: #444; }

        /* --- Form --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            align-items: start;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }

        .form-group label small {
            font-weight: 400;
            color: #999;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dfe3e8;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #333;
            background-color: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .form-control:disabled {
            background-color: #f4f6f9;
            color: #999;
            cursor: not-allowed;
        }

        .autocomplete-wrapper { position: relative; }

        .suggestion-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background-color: #fff;
            border: 1px solid #dfe3e8;
            border-radius: 8px;
            max-height: 230px;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            z-index: 60;
            display: none;
        }

        .suggestion-list.show { display: block; }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            font-size: 0.86rem;
            color: #333;
            cursor: pointer;
        }

        .suggestion-item:hover { background-color: #f4f6f9; }

        .suggestion-item img,
        .suggestion-avatar-fallback {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #f1f3f5;
            flex-shrink: 0;
        }

        .suggestion-avatar-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0b6bd;
            font-size: 0.7rem;
        }

        .suggestion-empty {
            padding: 10px 12px;
            font-size: 0.83rem;
            color: #999;
        }

        .photo-upload-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .photo-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px dashed #dfe3e8;
            color: #b0b6bd;
            font-size: 1.6rem;
        }

        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-primary { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: #fff; }
        .btn-secondary { background-color: #eef0f3; color: #555; }
        .btn-danger { background-color: #fdecea; color: #e74c3c; }
        .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 5px; }

        /* --- Table --- */
        .table-responsive { overflow-x: auto; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .custom-table th, .custom-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        .custom-table th { background-color: #f8f9fa; color: #555; font-weight: 600; }
        .custom-table tr:hover { background-color: #f9f9f9; }

        .table-photo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #f1f3f5;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #b0b6bd;
        }

        .id-badge {
            display: inline-block;
            background-color: #eef0ff;
            color: var(--secondary-color);
            font-weight: 700;
            font-size: 0.78rem;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .action-cell { display: flex; gap: 8px; }

        .status-msg {
            font-size: 0.85rem;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 14px;
            display: none;
        }

        .status-msg.show { display: block; }
        .status-msg.success { background-color: #eafaf1; color: #1e8449; }
        .status-msg.error { background-color: #fdecea; color: #c0392b; }

        /* Footer */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 0.75rem; }
            .navbar-brand img { height: 32px; }
            .navbar-brand span {
                font-size: 0.95rem;
                max-width: 130px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .navbar-right { gap: 8px; }
            .navbar-date { display: none !important; }
            .btn-dashboard { padding: 8px 10px; }
            .btn-dashboard span.btn-label { display: none; }

            .main-content { padding: 1rem; }
            .dashboard-card { padding: 16px; }

            .form-grid { grid-template-columns: 1fr; gap: 16px; }
            .photo-upload-area { justify-content: center; }

            .form-actions { flex-direction: column; }
            .form-actions .btn { width: 100%; justify-content: center; }

            .custom-table th, .custom-table td { padding: 10px 8px; font-size: 0.8rem; }
            .action-cell { flex-direction: column; gap: 6px; }
            .action-cell .btn { width: 100%; justify-content: center; }
        }

        @media (max-width: 480px) {
            .main-content { padding: 0.75rem; }
            .dashboard-card { padding: 14px; border-radius: 10px; }
            .dashboard-card h2 { font-size: 1.05rem; }
            .photo-preview { width: 64px; height: 64px; font-size: 1.4rem; }
            .id-badge { font-size: 0.72rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dasboradmin.html" class="navbar-brand">
            <img src="" alt="Logo Sekolah" style="display: none;">
            <span></span>
        </a>
        <div class="navbar-right">
            <a href="dasboradmin.html" class="btn-dashboard">
                <i class="fas fa-th-large"></i>
                <span class="btn-label">Dashboard</span>
            </a>
            <div class="navbar-date">
                <i class="far fa-calendar-alt" style="color: var(--primary-color);"></i>
                <span id="navbarDate"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">

        <div class="dashboard-card">
            <h2><i class="fa fa-user-circle" style="color: var(--primary-color);"></i> Data Koordinator PKL</h2>
            <p style="color: #666; margin-top: 10px;">Kelola data Koordinator Praktik Kerja Lapangan (PKL) pada halaman ini.</p>
        </div>

        <!-- Form Card -->
        <div class="dashboard-card">
            <div class="card-header">
                <h3 id="formTitle"><i class="fas fa-user-plus" style="color: var(--primary-color);"></i> Tambah Koordinator PKL</h3>
            </div>

            <form id="koordinatorForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>ID <small>(Otomatis)</small></label>
                        <input type="text" id="formId" class="form-control" disabled placeholder="Akan dibuat otomatis oleh sistem">
                    </div>

                    <div class="form-group">
                        <label for="formNama">Nama Koordinator</label>
                        <div class="autocomplete-wrapper" id="namaAutocompleteWrapper">
                            <input type="text" id="formNama" class="form-control" placeholder="Klik untuk pilih dari Data Guru, atau ketik manual" autocomplete="off" required>
                            <div class="suggestion-list" id="namaSuggestions"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="formNip">NIP</label>
                        <input type="text" id="formNip" class="form-control" placeholder="Contoh: 198501012010011001" inputmode="numeric" required>
                    </div>

                    <div class="form-group">
                        <label>Photo <small>(otomatis dari Data Guru)</small></label>
                        <div class="photo-upload-area">
                            <div class="photo-preview" id="photoPreview">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-save"></i> Simpan
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">
                        <i class="fas fa-times"></i> Batal Edit
                    </button>
                </div>

                <div class="status-msg" id="statusMsg"></div>
            </form>
        </div>

        <!-- Table Card -->
        <div class="dashboard-card">
            <div class="card-header">
                <h3><i class="fas fa-list" style="color: var(--primary-color);"></i> Daftar Koordinator PKL</h3>
            </div>
            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Photo</th>
                            <th>ID</th>
                            <th>Nama Koordinator</th>
                            <th>NIP</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="koordinatorTableBody">
                        <tr><td colspan="6" style="text-align:center;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2026 SMKN 1 SIMPANG TERITIP.</p>
            <p>CopyRight Kenji Studio Developer.</p>
        </footer>
    </main>

    <script>
        // --- Supabase Integration ---
        // Menggunakan 1 project Supabase untuk semua kebutuhan
        const supabaseUrl = 'https://ixccpgfllwerlifpcpdp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Y2NwZ2ZsbHdlcmxpZnBjcGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NTE3MTEsImV4cCI6MjA5ODQyNzcxMX0.CwrrPcl0RkDK4zRWhfp7oTqwNlxOIZIb3IGUUzKTE9Q';

        const koordinatorSupabaseUrl = supabaseUrl;
        const koordinatorSupabaseKey = supabaseKey;

        const TABLE_NAME = 'koordinatorpkl';

        let supabaseClient = null;
        let koordinatorClient = null;
        let editingId = null;
        let currentFotoUrl = null;
        let koordinatorCache = [];
        let guruCache = [];

        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
            koordinatorClient = supabase.createClient(koordinatorSupabaseUrl, koordinatorSupabaseKey);
        }

        // --- Navbar: Identitas Sekolah ---
        async function loadSchoolIdentity() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('identitassekolah')
                    .select('nama_sekolah, logo')
                    .limit(1)
                    .single();

                if (data) {
                    if (data.nama_sekolah) {
                        document.querySelector('.navbar-brand span').textContent = data.nama_sekolah;
                    }
                    if (data.logo) {
                        const img = document.querySelector('.navbar-brand img');
                        img.src = data.logo;
                        img.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error('Error loading school identity:', err);
            }
        }

        // --- Navbar: Tanggal ---
        function updateNavbarDate() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('navbarDate').textContent = now.toLocaleDateString('id-ID', options);
        }

        // --- Status Message Helper ---
        function showStatus(message, type) {
            const el = document.getElementById('statusMsg');
            el.textContent = message;
            el.className = 'status-msg show ' + type;
            setTimeout(() => { el.classList.remove('show'); }, 4000);
        }

        // --- Load Data Guru (untuk suggestion Nama Koordinator) ---
        async function loadGuruList() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('dataguru')
                    .select('nama_guru, nip, photo')
                    .order('nama_guru', { ascending: true });

                if (error) throw error;
                guruCache = data || [];
            } catch (err) {
                console.error('Error loading data guru:', err);
            }
        }

        // --- Render Daftar Suggestion Nama Guru ---
        function renderSuggestions(filter) {
            const list = document.getElementById('namaSuggestions');
            list.innerHTML = '';

            const query = (filter || '').trim().toLowerCase();
            const filtered = query
                ? guruCache.filter(g => (g.nama_guru || '').toLowerCase().includes(query))
                : guruCache;

            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'suggestion-empty';
                empty.textContent = guruCache.length === 0
                    ? 'Data guru belum tersedia.'
                    : 'Nama guru tidak ditemukan.';
                list.appendChild(empty);
            } else {
                filtered.slice(0, 8).forEach(g => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';

                    if (g.photo) {
                        const img = document.createElement('img');
                        img.src = g.photo;
                        img.alt = '';
                        item.appendChild(img);
                    } else {
                        const fallback = document.createElement('span');
                        fallback.className = 'suggestion-avatar-fallback';
                        fallback.innerHTML = '<i class="fas fa-user"></i>';
                        item.appendChild(fallback);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = g.nama_guru || '(Tanpa nama)';
                    item.appendChild(nameSpan);

                    item.addEventListener('click', () => selectGuru(g));
                    list.appendChild(item);
                });
            }

            list.classList.add('show');
        }

        function hideSuggestions() {
            document.getElementById('namaSuggestions').classList.remove('show');
        }

        // --- Pilih Guru dari Suggestion ---
        function selectGuru(guru) {
            document.getElementById('formNama').value = guru.nama_guru || '';
            document.getElementById('formNip').value = guru.nip || '';

            currentFotoUrl = guru.photo || null;

            document.getElementById('photoPreview').innerHTML = guru.photo
                ? `<img src="${guru.photo}" alt="Preview">`
                : '<i class="fas fa-user"></i>';

            hideSuggestions();
        }

        const formNamaInput = document.getElementById('formNama');
        formNamaInput.addEventListener('focus', () => renderSuggestions(formNamaInput.value));
        formNamaInput.addEventListener('click', () => renderSuggestions(formNamaInput.value));
        formNamaInput.addEventListener('input', () => renderSuggestions(formNamaInput.value));

        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('namaAutocompleteWrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                hideSuggestions();
            }
        });

        // --- Load Daftar Koordinator PKL ---
        async function loadKoordinatorList() {
            const tbody = document.getElementById('koordinatorTableBody');
            if (!koordinatorClient) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#e74c3c;">Supabase belum termuat.</td></tr>';
                return;
            }

            try {
                const { data, error } = await koordinatorClient
                    .from(TABLE_NAME)
                    .select('*');

                if (error) throw error;

                koordinatorCache = (data || []).slice().sort((a, b) => {
                    const numA = parseInt(a.id, 10);
                    const numB = parseInt(b.id, 10);
                    if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
                    return String(a.id).localeCompare(String(b.id));
                });

                tbody.innerHTML = '';

                if (koordinatorCache.length > 0) {
                    koordinatorCache.forEach((item, index) => {
                        const fotoCell = item.photo
                            ? `<img src="${item.photo}" class="table-photo" alt="Foto">`
                            : `<span class="table-photo"><i class="fas fa-user"></i></span>`;

                        const row = `<tr>
                            <td>${index + 1}</td>
                            <td>${fotoCell}</td>
                            <td><span class="id-badge">#${item.id}</span></td>
                            <td>${item.nama || '-'}</td>
                            <td>${item.nip || '-'}</td>
                            <td class="action-cell">
                                <button type="button" class="btn btn-secondary btn-sm" onclick="editKoordinator('${item.id}')">
                                    <i class="fas fa-pen"></i> Edit
                                </button>
                                <button type="button" class="btn btn-danger btn-sm" onclick="deleteKoordinator('${item.id}')">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Belum ada data Koordinator PKL.</td></tr>';
                }
            } catch (err) {
                console.error('Error loading koordinator list:', err);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#e74c3c;">Gagal memuat data: ${err.message}</td></tr>`;
            }
        }

        // --- Generate ID Otomatis (id bertipe text di database) ---
        function generateNextId() {
            const numericIds = koordinatorCache
                .map(item => parseInt(item.id, 10))
                .filter(n => !isNaN(n));
            const maxId = numericIds.length > 0 ? Math.max(...numericIds) : 0;
            return String(maxId + 1);
        }

        // --- Simpan (Tambah / Update via Upsert berdasarkan ID) ---
        document.getElementById('koordinatorForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const nama = document.getElementById('formNama').value.trim();
            const nip = document.getElementById('formNip').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            if (!nama || !nip) {
                showStatus('Nama Koordinator dan NIP wajib diisi.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            try {
                // Jika sedang edit, gunakan ID yang sudah ada (akan diUPDATE).
                // Jika data baru, buat ID otomatis (akan ditambahkan/INSERT).
                const idToUse = editingId || generateNextId();

                const { error } = await koordinatorClient
                    .from(TABLE_NAME)
                    .upsert({ id: idToUse, nama: nama, nip: nip, photo: currentFotoUrl }, { onConflict: 'id' });

                if (error) throw error;

                showStatus(
                    editingId ? 'Data Koordinator PKL berhasil diperbarui.' : 'Data Koordinator PKL berhasil ditambahkan.',
                    'success'
                );

                resetForm();
                loadKoordinatorList();
            } catch (err) {
                console.error('Error saving koordinator:', err);
                showStatus('Gagal menyimpan data: ' + err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = editingId
                    ? '<i class="fas fa-save"></i> Update'
                    : '<i class="fas fa-save"></i> Simpan';
            }
        });

        // --- Edit ---
        function editKoordinator(id) {
            const item = koordinatorCache.find(k => String(k.id) === String(id));
            if (!item) return;

            editingId = item.id;
            currentFotoUrl = item.photo || null;

            document.getElementById('formId').value = item.id;
            document.getElementById('formNama').value = item.nama || '';
            document.getElementById('formNip').value = item.nip || '';

            document.getElementById('photoPreview').innerHTML = item.photo
                ? `<img src="${item.photo}" alt="Preview">`
                : '<i class="fas fa-user"></i>';

            document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-edit" style="color: var(--primary-color);"></i> Edit Koordinator PKL';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Update';
            document.getElementById('cancelEditBtn').style.display = 'inline-flex';
            hideSuggestions();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Batal Edit ---
        document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

        function resetForm() {
            editingId = null;
            currentFotoUrl = null;

            document.getElementById('koordinatorForm').reset();
            document.getElementById('formId').value = '';
            document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user"></i>';
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus" style="color: var(--primary-color);"></i> Tambah Koordinator PKL';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Simpan';
            document.getElementById('cancelEditBtn').style.display = 'none';
            hideSuggestions();
        }

        // --- Hapus ---
        async function deleteKoordinator(id) {
            if (!confirm('Apakah Anda yakin ingin menghapus data Koordinator PKL ini?')) return;

            try {
                const { error } = await koordinatorClient
                    .from(TABLE_NAME)
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showStatus('Data Koordinator PKL berhasil dihapus.', 'success');
                loadKoordinatorList();
            } catch (err) {
                console.error('Error deleting koordinator:', err);
                showStatus('Gagal menghapus data: ' + err.message, 'error');
            }
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbarDate();
            loadSchoolIdentity();
            loadGuruList();
            loadKoordinatorList();
        });
    </script>
</body>
</html>
