<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPEL-DIK</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- jsPDF & AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --sidebar-bg: #2c3e50;
            --sidebar-text: #ecf0f1;
            --sidebar-hover: #34495e;
            --header-height: 60px;
            --sidebar-width: 260px;
            --bg-light: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            height: var(--header-height);
            background-color: #fff;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            z-index: 1002;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
        }

        .navbar-brand img {
            height: 40px;
            width: auto;
        }

        .navbar-brand span {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--secondary-color);
        }

        /* --- Main Content --- */
        .main-content {
            margin-top: var(--header-height);
            margin-left: 0;
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }

        .dashboard-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Footer */
        .main-footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .navbar-brand span {
                font-size: 1rem;
            }

            .main-content {
                padding: 2rem 5px;
            }

            .dashboard-card {
                padding: 15px;
            }

            .toolbar-wrap {
                justify-content: center;
            }

            .toolbar-wrap .btn {
                flex: 1 1 auto;
                justify-content: center;
            }

            .modal-content {
                width: calc(100% - 10px);
                margin: 0 5px;
            }

            .modal-footer {
                flex-wrap: wrap;
            }

            .modal-footer .btn {
                flex: 1 1 auto;
                justify-content: center;
            }
        }

        /* --- Styles Tambahan untuk Tabel dan Tombol --- */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
            color: white;
        }
        .btn-primary { background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background-color: #ef4444; }
        .btn-danger:hover { background-color: #dc2626; }

        .table-responsive { overflow-x: auto; }
        .custom-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .custom-table th, .custom-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        .custom-table th { background-color: #f8f9fa; color: #555; font-weight: 600; }
        .custom-table tr:hover { background-color: #f9f9f9; }

        .toolbar-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* --- Modal Styles --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: slideDown 0.3s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-header h3 { margin: 0; color: #333; font-size: 1.2rem; }
        .close-modal { font-size: 1.5rem; cursor: pointer; color: #888; transition: color 0.2s; }
        .close-modal:hover { color: #ef4444; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .form-group input[readonly] { background-color: #f3f4f6; cursor: not-allowed; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-secondary { background-color: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background-color: #cbd5e1; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="dasboradmin.html" class="navbar-brand">
            <img src="" alt="Logo Sekolah" style="display: none;">
            <span></span>
        </a>
        <a href="dasboradmin.html" class="btn btn-primary" style="margin-left: auto; padding: 8px 18px; font-size: 0.9rem; text-decoration: none;">
            <i class="fas fa-home"></i> Dashboard
        </a>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="dashboard-card">
            <h2>Data Guru Wali</h2>
            <p style="color: #666; margin-top: 10px;">Halaman untuk mengelola data guru wali.</p>
        </div>
        
        <!-- Container Tabel Data Guru Wali -->
        <div class="dashboard-card">
            <div class="toolbar-wrap">
                <button class="btn btn-primary" id="addGuruWaliBtn"><i class="fas fa-plus"></i> Tambah Guru Wali</button>
                <button class="btn btn-danger" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Export Pdf</button>
            </div>

            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIP</th>
                            <th>Nama Guru</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" style="text-align: center; color: #888; padding: 20px;">Belum ada data guru wali.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2026 SMKN 1 SIMPANG TERITIP.</p>
            <p>CopyRight Kenji Studio Developer.</p>
        </footer>
    </main>

    <!-- Modal Tambah Guru Wali -->
    <div id="guruWaliModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Guru Wali</h3>
                <span class="close-modal">&times;</span>
            </div>
            <form id="guruWaliForm">
                <input type="hidden" id="originalNip">
                <input type="hidden" id="isEditMode" value="false">
                <div class="form-group">
                    <label for="namaGuruWali">Nama Guru</label>
                    <select id="namaGuruWali" name="namaGuruWali" required>
                        <option value="">Pilih Guru</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nip">NIP</label>
                    <input type="text" id="nip" name="nip" readonly placeholder="Otomatis terisi">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary cancel-btn">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- Supabase Integration for Navbar Identity ---
        const supabaseUrl = 'https://obamjophcayslmubcqrp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iYW1qb3BoY2F5c2xtdWJjcXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODA3MDgsImV4cCI6MjA5OTg1NjcwOH0.-RSXTD3gXO_4iZNj1SIBppslskVrZYbIpOZKwt5or_I';
        
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let schoolData = {}; // Menyimpan data sekolah untuk keperluan export

        async function loadSchoolIdentity() {
            try {
                const { data, error } = await supabaseClient
                    .from('identitassekolah')
                    .select('nama_sekolah, logo, kop_sekolah, tahun_pelajaran')
                    .limit(1)
                    .single();
                
                if (data) {
                    schoolData = data; // Simpan data ke variabel global
                    if (data.nama_sekolah) {
                        document.querySelector('.navbar-brand span').textContent = data.nama_sekolah;
                    }
                    if (data.logo) {
                        const img = document.querySelector('.navbar-brand img');
                        img.src = data.logo;
                        img.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error("Error loading school identity:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadSchoolIdentity);
        document.addEventListener('DOMContentLoaded', loadGuruWaliData);

        // --- Modal Logic ---
        const modal = document.getElementById('guruWaliModal');
        const addBtn = document.getElementById('addGuruWaliBtn');
        const closeSpan = document.querySelector('.close-modal');
        const cancelBtn = document.querySelector('.cancel-btn');
        const guruWaliForm = document.getElementById('guruWaliForm');
        const namaGuruWaliSelect = document.getElementById('namaGuruWali');
        const nipInput = document.getElementById('nip');
        const isEditModeInput = document.getElementById('isEditMode');
        const originalNipInput = document.getElementById('originalNip');

        // Buka Modal
        addBtn.addEventListener('click', () => {
            guruWaliForm.reset();
            loadGuruOptions();
            isEditModeInput.value = "false";
            originalNipInput.value = "";
            document.querySelector('.modal-header h3').textContent = "Tambah Guru Wali";
            modal.classList.add('active');
        });

        // Tutup Modal
        function closeModal() {
            modal.classList.remove('active');
        }

        closeSpan.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- Fetch Data untuk Dropdown ---
        let guruDataList = [];

        async function loadGuruOptions() {
            namaGuruWaliSelect.innerHTML = '<option value="">Memuat data...</option>';
            try {
                const { data, error } = await supabaseClient
                    .from('dataguru')
                    .select('id_guru, nama_guru, nip::text')
                    .order('nama_guru');
                
                if (error) throw error;

                guruDataList = data;
                namaGuruWaliSelect.innerHTML = '<option value="">Pilih Guru</option>';
                
                data.forEach(guru => {
                    const option = document.createElement('option');
                    option.value = guru.nama_guru;
                    option.textContent = guru.nama_guru;
                    namaGuruWaliSelect.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading guru:', err);
                namaGuruWaliSelect.innerHTML = '<option value="">Gagal memuat data</option>';
            }
        }

        // --- Auto Fill NIP ---
        namaGuruWaliSelect.addEventListener('change', function() {
            const selectedGuru = guruDataList.find(g => g.nama_guru === this.value);
            if (selectedGuru) {
                nipInput.value = selectedGuru.nip || '';
            } else {
                nipInput.value = '';
            }
        });

        // Variabel global untuk menyimpan data
        let allGuruWaliData = [];

        // --- Load Data Guru Wali ---
        async function loadGuruWaliData() {
            const tableBody = document.querySelector('.custom-table tbody');
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';

            try {
                const { data, error } = await supabaseClient
                    .from('guruwali')
                    .select('nip::text, nama_guru')
                    .order('nama_guru', { ascending: true });

                if (error) throw error;

                allGuruWaliData = data; // Simpan data ke variabel global
                tableBody.innerHTML = '';

                if (!data || data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #888; padding: 20px;">Belum ada data guru wali.</td></tr>';
                    return;
                }

                data.forEach((wali, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${wali.nip}</td>
                        <td>${wali.nama_guru}</td>
                        <td>
                            <button onclick="editGuruWali('${wali.nip}')" style="background:none; border:none; color:#60a5fa; cursor:pointer;" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteGuruWali('${wali.nip}')" style="background:none; border:none; color:#f87171; cursor:pointer; margin-left:10px;" title="Hapus"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (err) {
                console.error('Error loading guru wali data:', err);
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: #ef4444;">Gagal memuat data: ${err.message}</td></tr>`;
            }
        }

        // --- Fungsi Edit Guru Wali ---
        window.editGuruWali = async function(nip) {
            const wali = allGuruWaliData.find(w => w.nip == nip);
            if (wali) {
                // Pastikan option terload dulu
                await loadGuruOptions();

                // Isi form
                namaGuruWaliSelect.value = wali.nama_guru;
                nipInput.value = wali.nip;
                originalNipInput.value = wali.nip; // Simpan NIP asli untuk update

                // Set Mode Edit
                isEditModeInput.value = "true";
                document.querySelector('.modal-header h3').textContent = "Edit Guru Wali";
                
                modal.classList.add('active');
            }
        }

        // --- Fungsi Hapus Guru Wali ---
        window.deleteGuruWali = async function(nip) {
            if (confirm(`Apakah Anda yakin ingin menghapus data guru wali dengan NIP: ${nip}?`)) {
                try {
                    const { error } = await supabaseClient
                        .from('guruwali')
                        .delete()
                        .eq('nip', nip);

                    if (error) throw error;

                    alert('Data berhasil dihapus.');
                    loadGuruWaliData(); // Refresh tabel
                } catch (err) {
                    console.error('Gagal menghapus:', err);
                    alert('Gagal menghapus data: ' + err.message);
                }
            }
        }

        // Handle Form Submit (Simpan Data Guru Wali)
        guruWaliForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = guruWaliForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Menyimpan...';
            submitBtn.disabled = true;

            try {
                const isEdit = isEditModeInput.value === "true";
                const nipVal = document.getElementById('nip').value;
                const namaVal = document.getElementById('namaGuruWali').value;
                const oldNip = originalNipInput.value;

                let result;
                if (isEdit) {
                    // Update Data
                    // Karena NIP adalah PK, jika NIP berubah (karena ganti orang), kita harus update PK
                    // Supabase support update PK jika tidak ada constraint FK yang melarang
                    result = await supabaseClient
                        .from('guruwali')
                        .update({ nip: nipVal, nama_guru: namaVal })
                        .eq('nip', oldNip);
                } else {
                    // Insert Data Baru
                    result = await supabaseClient
                        .from('guruwali')
                        .insert([{ nip: nipVal, nama_guru: namaVal }]);
                }

                if (result.error) throw result.error;

                alert('Data Guru Wali berhasil disimpan!');
                closeModal();
                loadGuruWaliData(); // Refresh tabel
            } catch (err) {
                console.error(err);
                alert('Terjadi kesalahan: ' + err.message);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // --- Export PDF Logic ---
        document.getElementById('exportPdfBtn').addEventListener('click', async () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            let yPos = 20;

            // Tambahkan KOP Sekolah jika ada
            if (schoolData.kop_sekolah) {
                try {
                    const response = await fetch(schoolData.kop_sekolah);
                    const blob = await response.blob();
                    const base64data = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });

                    const imgProps = doc.getImageProperties(base64data);
                    const pdfWidth = pageWidth - 20; // Margin kiri kanan 10
                    const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;
                    
                    doc.addImage(base64data, 'PNG', 10, 10, pdfWidth, imgHeight);
                    yPos = 10 + imgHeight + 10; // Update posisi Y di bawah gambar
                } catch (err) {
                    console.error("Gagal memuat KOP Sekolah:", err);
                }
            }

            // Judul Dokumen
            doc.setFontSize(18);
            doc.text("Laporan Data Guru Wali", pageWidth / 2, yPos, { align: 'center' });
            yPos += 8;
            
            // Nama Sekolah (ambil dari navbar)
            const schoolName = schoolData.nama_sekolah || document.querySelector('.navbar-brand span').textContent || 'SMK Negeri 1 Simpang Teritip';
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text(schoolName, pageWidth / 2, yPos, { align: 'center' });
            yPos += 6;

            // Tahun Pelajaran (ambil dari tabel identitassekolah)
            if (schoolData.tahun_pelajaran) {
                doc.setFontSize(11);
                doc.setTextColor(100);
                doc.text(`Tahun Pelajaran ${schoolData.tahun_pelajaran}`, pageWidth / 2, yPos, { align: 'center' });
                yPos += 6;
            }
            yPos += 4;

            // Persiapkan Data Tabel
            const tableRows = [];
            const rows = document.querySelectorAll('.custom-table tbody tr');

            rows.forEach((row) => {
                const cells = row.querySelectorAll('td');
                // Pastikan bukan baris loading atau kosong (cek jika ada kolom data > 1)
                if (cells.length > 1) {
                    const rowData = [
                        cells[0].innerText, // No
                        cells[1].innerText, // NIP
                        cells[2].innerText  // Nama Guru
                    ];
                    tableRows.push(rowData);
                }
            });

            // Generate Tabel PDF
            doc.autoTable({
                head: [['No', 'NIP', 'Nama Guru']],
                body: tableRows,
                startY: yPos,
                theme: 'grid',
                styles: { fontSize: 10 },
                headStyles: { fillColor: [102, 126, 234] } // Warna primary-color
            });

            // Simpan File
            doc.save('Data_Guru_Wali.pdf');
        });
    </script>
</body>
</html>
